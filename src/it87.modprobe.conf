# Fallback only. If the out-of-tree native driver fails to build/load,
# it87-load.sh runs `modprobe it87`, and this forces the mainline driver
# to treat the IT8613E as its close sibling IT8620E. That restores the
# case-fan channels and tach monitoring, but NOT full CPU-fan PWM control
# (which is why the out-of-tree driver is the primary path).
options it87 force_id=0x8620
